- name: Include GitHub release version check
  ansible.builtin.include_tasks: common/github_release.yml
  vars:
    binary_name: nono
    repo: always-further/nono
    version_check_command: nono --version
    version_pattern: v([0-9]+\.){2}[0-9]+
    add_v_prefix: true

- name: Download and extract nono
  when: current_nono_version | default('none') != nono_version
  become: true
  unarchive:
    src: "https://github.com/always-further/nono/releases/download/{{ nono_version }}/nono-{{ nono_version }}-x86_64-unknown-linux-gnu.tar.gz"
    dest: /usr/local/bin/
    remote_src: true
